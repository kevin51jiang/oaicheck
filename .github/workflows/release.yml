name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Run tests
        run: make test

      - name: Build release artifacts
        env:
          APP: oaicheck
        run: |
          set -euo pipefail
          mkdir -p dist

          VERSION="main-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )

          for t in "${targets[@]}"; do
            GOOS=$(echo "$t" | awk '{print $1}')
            GOARCH=$(echo "$t" | awk '{print $2}')

            out="${APP}-${VERSION}-${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then
              out="${out}.exe"
            fi

            GOOS="$GOOS" GOARCH="$GOARCH" CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o "dist/${out}" .

            if [ "$GOOS" = "windows" ]; then
              zip -j "dist/${APP}-${VERSION}-${GOOS}-${GOARCH}.zip" "dist/${out}"
            else
              tar -C dist -czf "dist/${APP}-${VERSION}-${GOOS}-${GOARCH}.tar.gz" "${out}"
            fi
          done

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
